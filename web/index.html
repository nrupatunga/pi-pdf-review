<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi pdf review</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111315;
      --panel: #17191c;
      --panel-2: #1d2024;
      --border: rgba(255, 255, 255, 0.09);
      --text: #ececec;
      --muted: #9a9a9a;
      --accent: #d9d9d9;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      font-family: "Typestar OCR", "OCR A Std", "OCR A Extended", "JetBrains Mono", "Fira Code", monospace;
      font-size: 12px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr);
    }

    button, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 5px 10px;
      font-size: 11px;
      line-height: 1.1;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: var(--panel-2);
    }

    button:focus {
      outline: 1px solid rgba(255, 255, 255, 0.12);
      outline-offset: -1px;
    }

    button:active:not(:disabled) {
      background: var(--panel-2);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .primary {
      background: #f4f4f4;
      color: #111;
      border-color: rgba(255, 255, 255, 0.22);
    }

    .primary:hover:not(:disabled) {
      background: #ddd;
      color: #111;
    }

    .danger {
      color: #f2b8b8;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(17, 19, 21, 0.96);
    }

    .title-wrap {
      min-width: 0;
    }

    .title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle {
      margin-top: 1px;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .status {
      font-size: 10px;
      color: var(--muted);
      padding: 0 2px;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 10px;
      color: var(--muted);
      margin-left: 3px;
    }

    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #141618;
    }

    #pdf-viewer {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 20px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .page-shell {
      width: min-content;
      position: relative;
      padding-left: 16px;
    }

    .page-label {
      margin-bottom: 8px;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }

    .page-stage {
      position: relative;
      background: #fff;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .page-canvas { display: block; }

    .highlight-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .sel-rect {
      background: rgba(74, 118, 255, 0.25);
      border-radius: 2px;
    }

    .interaction-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: text;
    }

    .annotation-gutter {
      position: absolute;
      left: 0;
      width: 12px;
      pointer-events: none;
    }

    .annotation-marker {
      position: absolute;
      left: 5px;
      width: 2px;
      min-height: 10px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(180, 188, 205, 0.45);
      pointer-events: auto;
      cursor: pointer;
      transition: background 120ms ease, width 120ms ease, left 120ms ease;
    }

    .annotation-marker:hover {
      background: rgba(255, 255, 255, 0.64);
    }

    .annotation-marker.active {
      background: rgba(255, 255, 255, 0.88);
      width: 3px;
      left: 4px;
    }

    .annotation-badge {
      position: absolute;
      top: -2px;
      left: -5px;
      min-width: 12px;
      height: 12px;
      padding: 0 2px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: #1a1d20;
      color: var(--muted);
      font-size: 8px;
      line-height: 10px;
      text-align: center;
      pointer-events: none;
    }

    .annotation-marker.active .annotation-badge {
      color: #111;
      background: #f2f2f2;
      border-color: rgba(255, 255, 255, 0.28);
    }

    .annotation-marker.sent {
      background: rgba(120, 140, 160, 0.25);
    }

    .drawer {
      position: absolute;
      top: 8px;
      left: 8px;
      bottom: 8px;
      width: 280px;
      max-width: calc(100vw - 16px);
      background: rgba(23, 25, 28, 0.97);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      transform: translateX(calc(-100% - 16px));
      transition: transform 140ms ease;
      z-index: 10;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }

    .drawer-title {
      font-size: 11px;
      font-weight: 600;
    }

    .comment-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .comment-card {
      border: 1px solid var(--border);
      background: #1a1d20;
      padding: 10px;
      cursor: pointer;
    }

    .comment-card.active {
      border-color: rgba(255, 255, 255, 0.2);
      background: #202327;
    }

    .comment-card.sent {
      opacity: 0.5;
    }

    .comment-card.sent.active {
      opacity: 0.7;
    }

    .comment-page {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .comment-quote {
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.45;
      color: var(--text);
    }

    .comment-body {
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.5;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .comment-card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
    }

    .comment-list-empty {
      color: var(--muted);
      line-height: 1.55;
      text-align: center;
      padding: 14px;
      border: 1px dashed var(--border);
      font-size: 11px;
    }

    .inline-comment {
      position: absolute;
      z-index: 20;
      width: 340px;
      background: #17191c;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: var(--shadow);
      display: none;
      flex-direction: column;
      gap: 0;
    }

    .inline-comment.open {
      display: flex;
    }

    .inline-comment-quote {
      padding: 8px 10px;
      font-size: 10px;
      line-height: 1.45;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      max-height: 60px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .inline-comment-input {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
      font-size: 11px;
      outline: none;
      resize: none;
      min-height: 32px;
      max-height: 80px;
    }

    .inline-comment-hint {
      padding: 4px 10px 6px;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.25);
    }

    .toast {
      position: fixed;
      top: 52px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #22c55e;
      color: #fff;
      padding: 10px 24px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.35);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: transform 250ms ease, opacity 250ms ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
    }

    .help-overlay.open {
      display: flex;
    }

    .help-card {
      background: #17191c;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 16px 20px;
      width: min(400px, 90vw);
      font-size: 11px;
      line-height: 1.6;
    }

    .help-card h3 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .help-card table {
      width: 100%;
      border-collapse: collapse;
    }

    .help-card td {
      padding: 2px 0;
    }

    .help-card td:first-child {
      width: 50px;
      color: var(--accent);
      font-weight: 600;
    }

    .help-card td:last-child {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title-wrap">
      <div class="title" id="doc-title">Loading…</div>
      <div class="subtitle" id="doc-subtitle"></div>
    </div>
    <div class="controls">
      <span class="status" id="status-pill">Starting…</span>
      <button id="toggle-comments">Notes<span class="badge" id="comment-count">0</span></button>
      <button id="comment-selection" disabled>Comment</button>
      <button class="primary" id="submit-review">Ask Pi</button>
      <button class="danger" id="cancel-review">Close</button>
      <button id="help-btn" title="Shortcuts">?</button>
    </div>
  </header>

  <main class="stage">
    <div id="pdf-viewer"></div>

    <aside class="drawer" id="comments-drawer">
      <div class="drawer-header">
        <span class="drawer-title">Notes</span>
        <button id="close-drawer">Hide</button>
      </div>
      <div class="comment-list" id="comment-list"></div>
    </aside>
  </main>

  <div class="help-overlay" id="help-overlay">
    <div class="help-card">
      <h3>Keyboard shortcuts</h3>
      <table>
        <tr><td>a</td><td>Add comment on selection</td></tr>
        <tr><td>Enter</td><td>Save comment / Ask Pi</td></tr>
        <tr><td>e</td><td>Edit focused note</td></tr>
        <tr><td>d</td><td>Delete focused note</td></tr>
        <tr><td>n / p</td><td>Next / previous note</td></tr>
        <tr><td>j / k</td><td>Scroll down / up</td></tr>
        <tr><td>^D / ^U</td><td>Page down / up</td></tr>
        <tr><td>b</td><td>Toggle sidebar</td></tr>
        <tr><td>?</td><td>Toggle this help</td></tr>
        <tr><td>Esc</td><td>Close input / sidebar / help</td></tr>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="inline-comment" id="inline-comment">
    <div class="inline-comment-quote" id="inline-quote"></div>
    <input class="inline-comment-input" id="inline-input" type="text" placeholder="Note or question…" autocomplete="off" />
    <div class="inline-comment-hint">Enter save · Esc cancel</div>
  </div>

  <script>
    window.__PDF_REVIEW_BOOT__ = __INLINE_DATA__;
  </script>
  <script type="module" src="/pdfium.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
